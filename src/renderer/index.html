<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Quota Glass</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-size="medium" data-state="loading">
    <main class="shell">
      <div class="aura aura-red"></div>
      <div class="aura aura-blue"></div>
      <div class="top-glint"></div>

      <header class="header">
        <div class="brand">
          <span id="led" class="led"></span>
          <div class="brand-copy">
            <strong>Codex 额度</strong>
            <span id="stateText">读取中</span>
          </div>
        </div>
        <nav class="actions">
          <span id="planBadge" class="plan-badge">--</span>
          <button id="refreshBtn" title="刷新">↻</button>
          <button id="closeBtn" title="关闭">×</button>
        </nav>
      </header>

      <section class="content">
        <div class="orb">
          <div id="liquid" class="liquid">
            <svg class="water-svg" viewBox="0 0 240 160" preserveAspectRatio="none" aria-hidden="true">
              <path class="water-fill" d="M0 16 C 15 4, 45 4, 60 16 C 75 28, 105 28, 120 16 C 135 4, 165 4, 180 16 C 195 28, 225 28, 240 16 L240 160 L0 160 Z" />
            </svg>
            <svg class="water-svg water-svg-b" viewBox="0 0 240 160" preserveAspectRatio="none" aria-hidden="true">
              <path class="water-fill secondary-fill" d="M0 16 C 15 28, 45 28, 60 16 C 75 4, 105 4, 120 16 C 135 28, 165 28, 180 16 C 195 4, 225 4, 240 16 L240 160 L0 160 Z" />
            </svg>
            <span class="bubble bubble-a"></span>
            <span class="bubble bubble-b"></span>
            <span class="bubble bubble-c"></span>
          </div>
          <div class="orb-shine"></div>
          <div class="orb-copy">
            <strong id="remaining">--%</strong>
            <span>remaining</span>
          </div>
        </div>

        <div class="metrics">
          <article class="metric primary">
            <span>5h window</span>
            <strong id="primaryText">--</strong>
          </article>
          <article class="metric secondary">
            <span>7d window</span>
            <strong id="secondaryText">--</strong>
          </article>
          <article class="metric plan">
            <span>plan</span>
            <strong id="planText">--</strong>
          </article>
        </div>

        <div class="peek-panel">
          <div class="peek-group">
            <span class="peek-label">5h</span>
            <strong id="peekPrimary" class="peek-value">--</strong>
          </div>
          <div class="peek-group">
            <span class="peek-label">7d</span>
            <strong id="peekSecondary" class="peek-value">--</strong>
          </div>
          <em id="peekPlan">--</em>
        </div>
      </section>

      <footer id="statusText" class="status">Reading Codex quota...</footer>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
